<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Interactive Registration Form</title>

    <link
        rel="stylesheet"
        href="styles.css">
</head>

<body>

    <div class="container">

        <div class="form-card">

            <div class="top-line"></div>

            <h1>Boileen Graphics</h1>

            <p class="subtitle">
                Create your account to start designing.
            </p>

            <form id="registrationForm">

                <!-- Full Name -->

                <div class="input-group">

                    <label for="name">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="name"
                        placeholder="John Doe">

                    <small class="error-message"></small>

                </div>

                <!-- Email -->

                <div class="input-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="john@example.com">

                    <small class="error-message"></small>

                </div>

                <!-- Phone -->

                <div class="input-group">

                    <label for="phone">
                        Phone Number
                    </label>

                    <input
                        type="tel"
                        id="phone"
                        placeholder="(555) 000-0000">

                    <small class="error-message"></small>

                </div>

                <!-- Password -->

                <div class="input-group">

                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter password">

                    <small class="error-message"></small>

                </div>

                <!-- Password Strength -->

                <div class="strength-bars">

                    <span></span>
                    <span></span>
                    <span></span>

                </div>

                <!-- Success Message -->

                <p class="success-message"></p>

                <!-- Submit Button -->

                <button type="submit">

                    Create Account

                </button>

            </form>

            <p class="terms">

                By signing up, you agree to our

                <a href="#">
                    Terms of Service
                </a>

            </p>

        </div>

    </div>

    <script src="index.js"></script>

</body>

</html>
